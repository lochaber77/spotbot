services:
  # Unofficial WhatsApp HTTP API. Keeps the messy session handling in its own
  # container and exposes a webhook (inbound) + REST (send). Multi-arch image,
  # so it builds/pulls natively on the arm64 Mac mini.
  waha:
    image: devlikeapro/waha:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_HOOK_URL=${WEBHOOK_URL}
      - WHATSAPP_HOOK_EVENTS=message
      - WAHA_API_KEY=${WAHA_API_KEY}
      - TZ=${TZ}
    volumes:
      - waha-sessions:/app/.sessions

  # The "brain": FastAPI webhook receiver + Claude. SQLite lives on a volume so
  # data survives restarts (and is a single file you can copy on cutover).
  app:
    build: ./app
    restart: unless-stopped
    depends_on:
      - waha
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
      - WAHA_URL=${WAHA_URL}
      - WAHA_SESSION=${WAHA_SESSION}
      - WAHA_API_KEY=${WAHA_API_KEY}
      - ALLOWED_NUMBERS=${ALLOWED_NUMBERS}
      - TZ=${TZ}
      # Shared calendar (M3). Blank GOOGLE_CALENDAR_ID keeps it disabled.
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID}
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON:-/secrets/service-account.json}
      - CONFIRMATION_TTL_MINUTES=${CONFIRMATION_TTL_MINUTES:-30}
    volumes:
      - app-data:/data
      # To enable the shared calendar, drop the service-account JSON at
      # GOOGLE_SERVICE_ACCOUNT_HOST_PATH and uncomment this read-only mount:
      # - ${GOOGLE_SERVICE_ACCOUNT_HOST_PATH:-./secrets/service-account.json}:/secrets/service-account.json:ro

volumes:
  waha-sessions:
  app-data:
