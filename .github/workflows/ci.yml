name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest

      - name: Compile check
        run: python -m py_compile app/*.py

      - name: Run tests
        env:
          # config.py requires these at import; values are dummies for tests.
          ANTHROPIC_API_KEY: test-key
          ALLOWED_NUMBERS: "447700900000"
          TZ: Europe/London
          PYTHONPATH: app
        run: pytest -q
